<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modoo 價格系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f1efea;--border:#e2dfd7;--border2:#ccc9c0;
  --text:#1a1917;--text2:#6b6860;--text3:#9e9c96;
  --accent:#2a5caa;--accent-bg:#eef3fb;--accent-border:#b8cde8;--accent-text:#1a3f7a;
  --warn-bg:#fff8ec;--warn-border:#f5d98a;--warn-text:#7a5500;
  --danger-bg:#fef2f2;--danger-border:#f5a8a8;--danger-text:#8b1a1a;
  --green-bg:#f0faf4;--green-border:#86d9a8;--green-text:#1a5c36;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,"Noto Sans TC","PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100}
.tab-btn{padding:14px 20px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.tab-content{display:none}.tab-content.active{display:block}

/* ── Layout ── */
.app{max-width:980px;margin:0 auto;padding:2rem 1.5rem 4rem}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}

/* ── Cat tabs ── */
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cat-tab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;font-family:inherit}
.cat-tab:hover{border-color:var(--border2);color:var(--text)}
.cat-tab.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent-text);font-weight:500}

/* ── Product grid ── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-bottom:2rem}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s;user-select:none}
.product-card:hover{border-color:var(--border2)}
.product-card.selected{border:2px solid var(--accent);background:var(--accent-bg)}
.product-card .pcat{font-size:11px;color:var(--text3);margin-bottom:3px}
.product-card .pname{font-size:13px;font-weight:500;color:var(--text)}
.product-card.selected .pname{color:var(--accent-text)}
.product-card .pprice{font-size:12px;color:var(--text3);margin-top:5px}
.product-card.selected .pprice{color:var(--accent)}
.qty-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.qty-btn{width:24px;height:24px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;transition:background .1s}
.qty-btn:hover{background:var(--bg)}
.qty-val{min-width:18px;text-align:center;font-size:13px;font-weight:600}

/* ── Selected panel ── */
hr{border:none;border-top:1px solid var(--border);margin:1.75rem 0}
.selected-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem}
.sel-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.sel-item:last-child{border-bottom:none}
.sel-name{font-weight:500}
.sel-info{font-size:12px;color:var(--text2)}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .1s,background .1s;font-family:inherit}
.remove-btn:hover{color:#c0392b;background:var(--danger-bg)}

/* ── Discount panel ── */
.discount-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end}
.disc-group{display:flex;flex-direction:column;gap:5px}
.disc-label{font-size:12px;color:var(--text2);font-weight:500}
.disc-input{width:120px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s}
.disc-input:focus{outline:none;border-color:var(--accent)}
.disc-hint{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Warning box ── */
.warning-box{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:var(--radius);margin-bottom:1.25rem;font-size:13px;line-height:1.5}
.warning-box.warn{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text)}
.warning-box.danger{background:var(--danger-bg);border:1px solid var(--danger-border);color:var(--danger-text)}

/* ── Results grid ── */
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:2rem}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.result-card.primary{background:var(--accent-bg);border:2px solid var(--accent-border)}
.result-card.alert{background:var(--warn-bg);border:1px solid var(--warn-border)}
.result-card.danger{background:var(--danger-bg);border:1px solid var(--danger-border)}
.result-label{font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.result-card.primary .result-label{color:var(--accent)}
.result-card.alert .result-label{color:var(--warn-text)}
.result-card.danger .result-label{color:var(--danger-text)}
.result-value{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.result-card.primary .result-value{color:var(--accent-text)}
.result-card.alert .result-value{color:var(--warn-text)}
.result-card.danger .result-value{color:var(--danger-text)}
.result-sub{font-size:11px;color:var(--text3);margin-top:3px}
.result-card.primary .result-sub{color:var(--accent);opacity:.8}

/* ── Query tab ── */
.query-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.search-input{flex:1;min-width:200px;padding:9px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit}
.search-input:focus{outline:none;border-color:var(--accent)}
.clear-btn{padding:9px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.clear-btn:hover{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text)}

/* ── Combo table ── */
.combo-table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
thead tr{background:var(--surface2)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-blue{background:var(--accent-bg);color:var(--accent-text)}
.na{color:var(--text3);font-size:12px}
.tag-calc{font-size:10px;color:var(--text3);margin-left:3px}
.tag-pending{font-size:11px;color:var(--warn-text)}
.no-data{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ── Match section ── */
.match-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.match-products{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.match-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn-primary{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:8px 16px;background:var(--surface);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.match-selected-summary{font-size:12px;color:var(--text2)}
.match-result-box{background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.match-result-title{font-size:13px;font-weight:600;color:var(--green-text);margin-bottom:4px}
.match-pct{font-size:12px;color:var(--green-text);background:var(--surface);padding:2px 8px;border-radius:10px;border:1px solid var(--green-border);margin-left:6px}
.match-parsed{font-size:11px;color:var(--green-text);opacity:.75;margin-bottom:6px}
.match-prices{display:flex;flex-wrap:wrap;gap:14px;font-size:13px}
.no-match{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--warn-text);margin-bottom:1rem}

@media(max-width:560px){
  .app{padding:1.25rem 1rem 3rem}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .results{grid-template-columns:1fr 1fr}
  .discount-panel{gap:14px}
  .tab-btn{padding:12px 12px;font-size:13px}
}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('calc',this)">🧮 價格計算機</button>
  <button class="tab-btn" onclick="switchTab('products',this)">🏷️ 單品查詢</button>
  <button class="tab-btn" onclick="switchTab('query',this)">📋 組合查詢</button>
</div>

<!-- ══════════ TAB 1: 計算機 ══════════ -->
<div id="tab-calc" class="tab-content active">
<div class="app">
  <div class="section-label">選擇單品</div>
  <div class="cat-tabs" id="calcCatTabs"></div>
  <div class="product-grid" id="productGrid"></div>

  <div id="calcSelectedSection" style="display:none">
    <hr>
    <div class="section-label">已選商品</div>
    <div class="selected-panel" id="selectedList"></div>

    <div class="section-label">手動覆蓋（選填）</div>
    <div class="discount-panel">
      <div class="disc-group">
        <label class="disc-label" for="actOverride">活動價</label>
        <input class="disc-input" type="number" id="actOverride" placeholder="預設平台售價×95%">
        <span class="disc-hint">空白＝自動計算</span>
      </div>
      <div class="disc-group">
        <label class="disc-label" for="hotOverride">熱銷組活動價</label>
        <input class="disc-input" type="number" id="hotOverride" placeholder="預設平台售價×90%">
        <span class="disc-hint">空白＝自動計算</span>
      </div>
    </div>

    <div id="warningBox" style="display:none"></div>
    <div class="section-label">計算結果</div>
    <div class="results" id="results"></div>
  </div>
</div>
</div>

<!-- ══════════ TAB 2: 單品查詢 ══════════ -->
<div id="tab-products" class="tab-content">
<div class="app">
  <div class="section-label">單品查詢</div>
  <div class="cat-tabs" id="prodQueryCatTabs"></div>
  <div class="query-toolbar">
    <input class="search-input" type="text" id="prodQuerySearch" placeholder="搜尋單品名稱…" oninput="renderProdTable()">
    <button class="clear-btn" onclick="clearProdQuery()">✕ 清除篩選</button>
  </div>
  <div class="combo-table-wrap">
    <table>
      <thead>
        <tr>
          <th>分類</th><th>商品名稱</th><th>原價</th><th>市價</th><th>平台售價</th>
          <th>團購價</th><th>最低價</th><th>活動價</th><th>賠本價</th>
        </tr>
      </thead>
      <tbody id="prodQueryTbody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- ══════════ TAB 3: 組合查詢 ══════════ -->
<div id="tab-query" class="tab-content">
<div class="app">

  <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
    <div class="section-label" style="margin-bottom:0">智慧比對</div>
    <span style="font-size:13px;color:var(--accent);font-weight:500">選好單品後自動搜尋</span>
  </div>
  <div class="cat-tabs" id="matchCatTabs"></div>
  <div class="product-grid" id="matchGrid"></div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap">
    <button class="btn-secondary" onclick="clearMatch()">清除</button>
    <span class="match-selected-summary" id="matchSummary"></span>
  </div>
  <div id="matchResults"></div>

  <hr>
  <div class="section-label">瀏覽所有組合</div>
  <div class="cat-tabs" id="queryCatTabs"></div>
  <div class="query-toolbar">
    <input class="search-input" type="text" id="querySearch" placeholder="搜尋組合名稱…" oninput="renderTable()">
    <button class="clear-btn" onclick="clearQuery()">✕ 清除篩選</button>
  </div>
  <div class="combo-table-wrap">
    <table>
      <thead>
        <tr>
          <th>分類</th><th>組合名稱</th><th>原價</th><th>市價</th><th>平台售價</th>
          <th>團購價</th><th>最低價</th><th>活動價</th><th>熱銷活動價</th><th>賠本價</th>
        </tr>
      </thead>
      <tbody id="comboTbody"></tbody>
    </table>
  </div>

</div>
</div>

<script>
// ═══ 全域函式：需在 DOM onclick 前定義 ═══
window.switchTab = function(t, btn) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
};

// 工具函式
// ═══════════════════════════════════════════════════════
const fmt = n => {
  if(n===null||n===undefined||n==="")return "—";
  if(n==="X"||n==="x")return "✕";
  return "NT$"+Math.round(n).toLocaleString();
};
// 組合活動價推算：平台售價 × 95%，無平台售價用市價 × 95%
const calcAct = (sale, msrp) => {
  const base = sale || msrp;
  return base ? Math.round(base * 0.95) : null;
};
// 熱銷組活動價推算：平台售價 × 92%
const calcHot = (sale, msrp) => {
  const base = sale || msrp;
  return base ? Math.round(base * 0.92) : null;
};
// 單品活動價推算：市價 × 93%
const calcProductAct = (msrp) => msrp ? Math.round(msrp * 0.93) : null;

// TAB 1: 計算機
// ═══════════════════════════════════════════════════════
const calcCats = ["全部", ...new Set(products.map(p=>p.cat))];
let calcActiveCat = "全部";
let selected = {};

function renderCalcCats(){
  document.getElementById("calcCatTabs").innerHTML = calcCats.map(c=>
    `<button class="cat-tab${c===calcActiveCat?" active":""}" onclick="setCalcCat('${c}')">${c}</button>`
  ).join("");
}
function setCalcCat(c){calcActiveCat=c;renderCalcCats();renderProducts();}

function renderProducts(){
  const list = calcActiveCat==="全部"?products:products.filter(p=>p.cat===calcActiveCat);
  document.getElementById("productGrid").innerHTML = list.map(p=>{
    const qty = selected[p.name]?selected[p.name].qty:0;
    return `<div class="product-card${qty>0?" selected":""}">
      <div class="pcat">${p.cat}</div>
      <div class="pname">${p.name}</div>
      <div class="pprice">市價 ${fmt(p.msrp)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty('${p.name.replace(/'/g,"\\'")}', -1)">−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${p.name.replace(/'/g,"\\'")}', 1)">＋</button>
      </div>
    </div>`;
  }).join("");
}

function changeQty(name, delta){
  const p = products.find(x=>x.name===name); if(!p) return;
  if(!selected[name]) selected[name]={...p,qty:0};
  selected[name].qty = Math.max(0, selected[name].qty+delta);
  if(selected[name].qty===0) delete selected[name];
  renderProducts(); renderSelected();
}
function removeItem(name){ delete selected[name]; renderProducts(); renderSelected(); }

function renderSelected(){
  const items = Object.values(selected).filter(x=>x.qty>0);
  const sec = document.getElementById("calcSelectedSection");
  sec.style.display = items.length===0?"none":"block";
  if(!items.length) return;

  document.getElementById("selectedList").innerHTML = items.map(item=>`
    <div class="sel-item">
      <div><span class="sel-name">${item.name}</span><span style="color:var(--text3);font-size:12px"> × ${item.qty}</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="sel-info">市價 ${fmt(item.msrp*item.qty)} ／ 售價 ${fmt(item.sale*item.qty)}</span>
        <button class="remove-btn" onclick="removeItem('${item.name.replace(/'/g,"\\'")}')">×</button>
      </div>
    </div>`).join("");
  calcResults(items);
}

function calcResults(items){
  const actRaw = document.getElementById("actOverride").value;
  const hotRaw = document.getElementById("hotOverride").value;

  // 依據需求：
  // 售價 = 單品平台售價加總 × 0.97
  // 團購價 = 售價 × 0.8
  // 最低價 = 單品最低價加總
  // 活動價 = 單品平台售價加總 × 0.95
  // 熱銷組活動價 = 單品平台售價加總 × 0.9
  const sumOri   = items.reduce((s,x)=>s+x.ori *x.qty,0);
  const sumMsrp  = items.reduce((s,x)=>s+x.msrp*x.qty,0);
  const sumSale  = items.reduce((s,x)=>s+x.sale*x.qty,0);
  const sumLow   = items.reduce((s,x)=>s+x.low *x.qty,0);
  const sumCost  = items.reduce((s,x)=>s+x.cost*x.qty,0);

  const oriVal   = Math.round(sumOri);
  const msrpVal  = Math.round(sumMsrp);
  const saleVal  = Math.round(sumSale * 0.97);
  const groupVal = Math.round(sumSale * 0.87);
  const minVal   = Math.round(sumLow);
  const costVal  = Math.round(sumCost);
  const actVal   = actRaw ? parseInt(actRaw) : Math.round(sumSale * 0.95);
  const hotVal   = hotRaw ? parseInt(hotRaw) : Math.round(sumSale * 0.9);

  const warnings = [];
  if(actVal < costVal) warnings.push(`⚠ 活動價 ${fmt(actVal)} 低於賠本價 ${fmt(costVal)}，請確認！`);
  if(hotVal < costVal) warnings.push(`⚠ 熱銷組活動價 ${fmt(hotVal)} 低於賠本價 ${fmt(costVal)}，請確認！`);
  if(minVal < costVal) warnings.push(`⚠ 最低價 ${fmt(minVal)} 低於賠本價 ${fmt(costVal)}，建議調高折扣`);
  if(groupVal < costVal) warnings.push(`⚠ 團購價 ${fmt(groupVal)} 低於賠本價 ${fmt(costVal)}，請確認！`);

  const wb = document.getElementById("warningBox");
  if(warnings.length){
    wb.style.display="flex"; wb.className="warning-box warn";
    wb.innerHTML=`<span>⚠</span><div>${warnings.join("<br>")}</div>`;
  } else { wb.style.display="none"; }

  const actClass = actVal < costVal ? "danger" : "";
  const hotClass = hotVal < costVal ? "danger" : "";
  const minClass = minVal < costVal ? "danger" : "";

  document.getElementById("results").innerHTML=`
    <div class="result-card">
      <div class="result-label">原價</div>
      <div class="result-value">${fmt(oriVal)}</div>
      <div class="result-sub">單品原價加總</div>
    </div>
    <div class="result-card">
      <div class="result-label">市價</div>
      <div class="result-value">${fmt(msrpVal)}</div>
      <div class="result-sub">單品市價加總</div>
    </div>
    <div class="result-card primary">
      <div class="result-label">售價</div>
      <div class="result-value">${fmt(saleVal)}</div>
      <div class="result-sub">平台售價加總 × 97%</div>
    </div>
    <div class="result-card">
      <div class="result-label">團購價</div>
      <div class="result-value">${fmt(groupVal)}</div>
      <div class="result-sub">平台售價加總 × 87%</div>
    </div>
    <div class="result-card ${minClass}">
      <div class="result-label">最低價</div>
      <div class="result-value">${fmt(minVal)}</div>
      <div class="result-sub">單品最低價加總</div>
    </div>
    <div class="result-card ${actClass}">
      <div class="result-label">活動價</div>
      <div class="result-value">${fmt(actVal)}</div>
      <div class="result-sub">${actRaw?"手動輸入":"平台售價加總 × 95%"}</div>
    </div>
    <div class="result-card ${hotClass}">
      <div class="result-label">熱銷組活動價</div>
      <div class="result-value">${fmt(hotVal)}</div>
      <div class="result-sub">${hotRaw?"手動輸入":"平台售價加總 × 90%"}</div>
    </div>
    <div class="result-card${costVal > saleVal?" alert":""}">
      <div class="result-label">賠本價</div>
      <div class="result-value">${fmt(costVal)}</div>
      <div class="result-sub">單品賠本價加總</div>
    </div>`;
}

["actOverride","hotOverride"].forEach(id=>{
  document.getElementById(id).addEventListener("input", renderSelected);
});

const queryCats = ["全部", ...new Set(combos.map(c=>c.cat))];
let queryActiveCat = "全部";

function renderQueryCats(){
  document.getElementById("queryCatTabs").innerHTML = queryCats.map(c=>
    `<button class="cat-tab${c===queryActiveCat?" active":""}" onclick="setQueryCat('${c}')">${c}</button>`
  ).join("");
}
function setQueryCat(c){ queryActiveCat=c; renderQueryCats(); renderTable(); }

function clearQuery(){
  queryActiveCat="全部";
  document.getElementById("querySearch").value="";
  renderQueryCats(); renderTable();
}

function renderTable(){
  const kw = document.getElementById("querySearch").value.toLowerCase();
  const filtered = combos.filter(c=>{
    const catOk = queryActiveCat==="全部"||c.cat===queryActiveCat;
    const kwOk  = !kw || c.name.toLowerCase().includes(kw)||c.cat.includes(kw);
    return catOk && kwOk;
  });
  const tbody = document.getElementById("comboTbody");
  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="10" class="no-data">查無符合的組合</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(c=>{
    // 活動價
    const actFill = c.act !== null && c.act !== undefined;
    const actVal  = actFill ? c.act : calcAct(c.sale, c.msrp);
    const actHtml = actVal === null ? '<span class="na">—</span>'
      : `${fmt(actVal)}${!actFill?'<span class="tag-calc">推算</span>':''}`;

    // 熱銷組活動價
    const hotX    = c.hot==="X"||c.hot==="x";
    const hotFill = c.hot !== null && c.hot !== undefined && !hotX;
    const hotVal  = hotX ? null : (hotFill ? c.hot : calcHot(c.sale, c.msrp));
    const hotHtml = hotX ? '✕'
      : hotVal === null ? '<span class="na">—</span>'
      : `${fmt(hotVal)}${!hotFill?'<span class="tag-calc">推算</span>':''}`;

    // 團購價
    const grpHtml = c.group==="X"||c.group==="x" ? '✕'
      : c.group===null ? '<span class="tag-pending">待補</span>'
      : fmt(c.group);

    // 低於賠本價警示
    const warnAct = c.cost && actVal && actVal < c.cost;
    const warnHot = c.cost && hotVal && hotVal < c.cost;

    return `<tr>
      <td><span class="badge badge-blue">${c.cat}</span></td>
      <td style="font-weight:500;min-width:180px">${c.name}</td>
      <td>${fmt(c.ori)}</td>
      <td>${fmt(c.msrp)}</td>
      <td>${c.sale===null?'<span class="na">—</span>':fmt(c.sale)}</td>
      <td>${grpHtml}</td>
      <td>${c.low===0||c.low===null?'<span class="na">—</span>':fmt(c.low)}</td>
      <td style="${warnAct?'color:var(--warn-text)':''}">${actHtml}</td>
      <td style="${warnHot?'color:var(--warn-text)':''}">${hotHtml}</td>
      <td>${c.cost?fmt(c.cost):'<span class="na">—</span>'}</td>
    </tr>`;
  }).join("");
}

// 智慧比對

function parseComboItems(comboName) {
  const n = comboName;
  const isLite = /lite|輕量/i.test(n);
  const counts = {};
  const add = (key, cnt=1) => { counts[key] = (counts[key]||0)+cnt; };

  if(isLite){
    const s = (n.match(/\bS\b/g)||[]).length; if(s) add('Lite收納袋S',s);
    const m = (n.match(/\bM\b/g)||[]).length; if(m) add('Lite收納袋M',m);
    const l = (n.match(/(?<![X])L(?![L])/g)||[]).length; if(l) add('Lite收納袋L',l);
    if(/鞋袋/.test(n)) add('Lite 鞋袋');
    if(/網袋/.test(n)) add('Lite 網袋組');
  } else {
    const s = (n.match(/\bS\b/g)||[]).length; if(s) add('收納袋 S',s);
    const m = (n.match(/\bM\b/g)||[]).length; if(m) add('收納袋 M',m);
    const xxl = (n.match(/XXL|2XL/g)||[]).length; if(xxl) add('收納袋 XXL',xxl);
    const xl  = (n.match(/(?<!X|2)XL/g)||[]).length - xxl; if(xl>0) add('收納袋 XL',xl);
    const baseL = (n.match(/(?<![X2S])L(?![L])/g)||[]).length; if(baseL>0) add('收納袋 L',baseL);
    if(/鞋袋/.test(n)) add('Lite 鞋袋');
    if(/網袋/.test(n)) add('Lite 網袋組');
  }

  const otherRules = [
    ['外套收納袋M',     /外套收納袋\s?M/],
    ['外套收納袋 L',    /外套收納袋\s?L/],
    ['多功能吊掛分隔收納袋', /吊掛/],
    ['床底收納專用收納袋',   /床底/],
    ['防盜機能側背包S', /側背[包]?\s?(?!L)(?=\+|包|組|$)/],
    ['防盜機能護照包',   /護照/],
    ['防盜機能側背包L', /側背[包]?L|側背L/],
    ['防盜機能後背包',   /防盜機能後背|(?<!safe)(?<!plus)後背包/i],
    ['Safeplus安心防盜後背包', /safe.*後背|後背.*safe/i],
    ['Safeplus安心防盜護照包', /safe.*護照|護照.*safe/i],
    ['Safeplus安心防盜側背包', /safe.*側背|側背.*safe/i],
    ['盥洗包', /盥洗/],
    ['半半包', /半半/],
    ['化妝包', /化妝/],
    ['托特包', /托特/],
    ['折疊後背包', /折疊後背/],
    ['折疊行李袋', /折疊行李/],
  ];
  for(const [key, re] of otherRules){
    if(!counts[key] && re.test(n)) add(key);
  }
  return counts;
}

function matchScore(chosenMap, comboMap){
  let inter=0, union=0;
  const allKeys = new Set([...Object.keys(chosenMap),...Object.keys(comboMap)]);
  for(const k of allKeys){
    const a=chosenMap[k]||0, b=comboMap[k]||0;
    inter+=Math.min(a,b); union+=Math.max(a,b);
  }
  return union===0?0:Math.round(inter/union*100);
}

const matchCats = ["全部", ...new Set(products.map(p=>p.cat))];
let matchActiveCat = "全部";
let matchChosen = {};

function renderMatchCatTabs(){
  document.getElementById("matchCatTabs").innerHTML = matchCats.map(c=>
    `<button class="cat-tab${c===matchActiveCat?" active":""}" onclick="setMatchCat('${c}')">${c}</button>`
  ).join("");
}
function setMatchCat(c){ matchActiveCat=c; renderMatchCatTabs(); renderMatchGrid(); }

function renderMatchGrid(){
  const list = matchActiveCat==="全部" ? products : products.filter(p=>p.cat===matchActiveCat);
  document.getElementById("matchGrid").innerHTML = list.map(p=>{
    const qty = matchChosen[p.name]||0;
    const sel = qty>0;
    return `<div class="product-card${sel?" selected":""}">
      <div class="pcat">${p.cat}</div>
      <div class="pname">${p.name}</div>
      <div class="pprice">售價 ${fmt(p.sale)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeMatchQty('${p.name.replace(/'/g,"\'")}', -1)">−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="changeMatchQty('${p.name.replace(/'/g,"\'")}', 1)">＋</button>
      </div>
    </div>`;
  }).join("");

  // 自動搜尋
  const chosen = Object.entries(matchChosen).filter(([,v])=>v>0);
  document.getElementById("matchSummary").textContent =
    chosen.length ? "已選："+chosen.map(([k,v])=>v>1?`${k}×${v}`:k).join("、") : "";
  if(chosen.length > 0) doMatch();
  else document.getElementById("matchResults").innerHTML="";
}

function changeMatchQty(name, delta){
  const cur = matchChosen[name]||0;
  const next = Math.max(0, cur+delta);
  if(next===0) delete matchChosen[name];
  else matchChosen[name]=next;
  renderMatchGrid();
}

function clearMatch(){
  matchChosen={};
  matchActiveCat="全部";
  renderMatchCatTabs();
  renderMatchGrid();
  document.getElementById("matchResults").innerHTML="";
}



// ═══════════════════════════════════════════════════════
// 智慧比對：doMatch
// ═══════════════════════════════════════════════════════
function doMatch(){
  const chosenEntries = Object.entries(matchChosen).filter(([,v])=>v>0);
  if(!chosenEntries.length){
    document.getElementById("matchResults").innerHTML='<div class="no-match">請先選擇至少一個單品</div>';
    return;
  }
  const chosenMap = Object.fromEntries(chosenEntries);

  const scored = combos.map(combo=>{
    const comboMap = parseComboItems(combo.name);
    const pct = matchScore(chosenMap, comboMap);
    return {...combo, pct, comboMap};
  }).filter(c=>c.pct>=80).sort((a,b)=>b.pct-a.pct);

  const el = document.getElementById("matchResults");
  if(!scored.length){
    el.innerHTML='<div class="no-match">⚠ 找不到相似度 ≥ 80% 的組合，這可能是尚未建立的新組合</div>';
    return;
  }

  el.innerHTML = scored.map(c=>{
    const actFill = c.act!==null&&c.act!==undefined;
    const actVal  = actFill?c.act:calcAct(c.sale,c.msrp);
    const hotX    = c.hot==="X"||c.hot==="x";
    const hotFill = c.hot!==null&&c.hot!==undefined&&!hotX;
    const hotVal  = hotX?null:(hotFill?c.hot:calcHot(c.sale,c.msrp));
    return `<div class="match-result-box">
      <div class="match-result-title">📦 ${c.name}<span class="match-pct">${c.pct}% 相符</span></div>
      <div class="match-parsed">解析：${Object.entries(c.comboMap).map(([k,v])=>v>1?k+"×"+v:k).join("、")||"—"}</div>
      <div class="match-prices">
        <span>分類：<b>${c.cat}</b></span>
        <span>原價：<b>${fmt(c.ori)}</b></span>
        <span>市價：<b>${fmt(c.msrp)}</b></span>
        <span>平台售價：<b>${fmt(c.sale)}</b></span>
        <span>活動價：<b>${actVal===null?"—":fmt(actVal)}${!actFill&&actVal?'<span class="tag-calc">推算</span>':''}</b></span>
        <span>熱銷活動價：<b>${hotX?"✕":hotVal===null?"—":fmt(hotVal)}${!hotFill&&!hotX&&hotVal?'<span class="tag-calc">推算</span>':''}</b></span>
        <span>賠本價：<b>${fmt(c.cost)}</b></span>
      </div>
    </div>`;
  }).join("");
}

  const kw = document.getElementById("prodQuerySearch").value.toLowerCase();

    const catOk = prodQueryActiveCat==="全部"||p.cat===prodQueryActiveCat;

  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="9" class="no-data">查無符合的單品</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(p=>`<tr>
    <td><span class="badge badge-blue">${p.cat}</span></td>
    <td style="font-weight:500">${p.name}</td>
    <td>${fmt(p.ori)}</td>
    <td>${fmt(p.msrp)}</td>
    <td>${fmt(p.sale)}</td>
    <td>${fmt(p.group)}</td>
    <td>${fmt(p.low)}</td>
    <td>${fmt(p.act)}</td>
    <td>${fmt(p.cost)}</td>
