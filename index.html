<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Modoo 價格工具</title>
<style>
/* --- 密碼遮罩樣式 --- */
#auth-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #f7f6f3; z-index: 9999; display: flex;
    align-items: center; justify-content: center; flex-direction: column;
    font-family: sans-serif;
}
#auth-overlay input { padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
#auth-overlay button { padding: 10px 20px; cursor: pointer; background: #2a5caa; color: white; border: none; border-radius: 4px; }

/* --- 你的原始 CSS --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f1efea;--surface3:#e8e5de;
  --border:#e2dfd7;--border2:#ccc9c0;--border3:#b0ad a6;
  --text:#1a1917;--text2:#6b6860;--text3:#9e9c96;
  --accent:#2a5caa;--accent-bg:#eef3fb;--accent-border:#b8cde8;--accent-text:#1a3f7a;
  --accent2:#c17d2a;--accent2-bg:#fdf4e7;--accent2-border:#f0d498;--accent2-text:#7a4e0a;
  --green:#1a7a3f;--green-bg:#edf7f1;--green-border:#a8ddb9;--green-text:#0d4f28;
  --warn-bg:#fff8ec;--warn-border:#f5d98a;--warn-text:#7a5500;
  --danger-bg:#fef2f2;--danger-border:#f5a8a8;--danger-text:#8b1a1a;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,"Noto Sans TC","PingFang TC",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:960px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:2rem}
.nav-brand{font-size:15px;font-weight:600;padding:1rem 0;color:var(--text);white-space:nowrap}
.nav-tabs{display:flex;gap:0}
.nav-tab{padding:.85rem 1.25rem;font-size:14px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:inherit;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;max-width:960px;margin:0 auto;padding:2rem 1.5rem 4rem}
.page.active{display:block}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
hr{border:none;border-top:1px solid var(--border);margin:1.75rem 0}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cat-tab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;font-family:inherit}
.cat-tab:hover{border-color:var(--border2);color:var(--text)}
.cat-tab.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent-text);font-weight:500}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-bottom:2rem}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:default;transition:border-color .15s,background .15s;user-select:none}
.product-card:hover{border-color:var(--border2)}
.product-card.selected{border:2px solid var(--accent);background:var(--accent-bg)}
.pcat{font-size:11px;color:var(--text3);margin-bottom:3px}
.pname{font-size:13px;font-weight:500;color:var(--text)}
.product-card.selected .pname{color:var(--accent-text)}
.pprice{font-size:12px;color:var(--text3);margin-top:5px}
.product-card.selected .pprice{color:var(--accent)}
.qty-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.qty-btn{width:24px;height:24px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;transition:background .1s}
.qty-btn:hover{background:var(--bg)}
.qty-val{min-width:18px;text-align:center;font-size:13px;font-weight:600}
.selected-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:1.5rem}
.sel-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.sel-item:last-child{border-bottom:none}
.sel-name{font-weight:500}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;font-family:inherit;transition:color .1s,background .1s}
.remove-btn:hover{color:#c0392b;background:var(--danger-bg)}
.disc-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.disc-grid{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end}
.disc-group{display:flex;flex-direction:column;gap:5px}
.disc-label{font-size:12px;color:var(--text2);font-weight:500}
.disc-input{width:120px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s}
.disc-input:focus{outline:none;border-color:var(--accent)}
.disc-sep{width:1px;height:40px;background:var(--border2);align-self:flex-end;margin:0 4px}
.disc-section-title{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.disc-block{padding:0 4px}
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:2rem}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.result-card.r-sale{background:var(--accent-bg);border:2px solid var(--accent-border)}
.result-card.r-act1{background:var(--green-bg);border:1px solid var(--green-border)}
.result-card.r-act2{background:var(--accent2-bg);border:1px solid var(--accent2-border)}
.result-card.r-warn-alert{background:var(--warn-bg);border:1px solid var(--warn-border)}
.rl{font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.r-sale .rl{color:var(--accent)}
.r-act1 .rl{color:var(--green)}
.r-act2 .rl{color:var(--accent2)}
.r-warn-alert .rl{color:var(--warn-text)}
.rv{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.r-sale .rv{color:var(--accent-text)}
.r-act1 .rv{color:var(--green-text)}
.r-act2 .rv{color:var(--accent2-text)}
.r-warn-alert .rv{color:var(--warn-text)}
.rs{font-size:11px;color:var(--text3);margin-top:3px}
.r-sale .rs{color:var(--accent);opacity:.8}
.r-act1 .rs{color:var(--green);opacity:.8}
.r-act2 .rs{color:var(--accent2);opacity:.8}
.warn-box{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:var(--r);margin-bottom:1.25rem;font-size:13px;line-height:1.5}
.warn-box.warn{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text)}
.warn-box.danger{background:var(--danger-bg);border:1px solid var(--danger-border);color:var(--danger-text)}
.query-layout{display:grid;grid-template-columns:220px 1fr;gap:1.5rem;margin-top:1rem}
.filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;height:fit-content;position:sticky;top:72px}
.filter-title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.filter-btn{display:block;width:100%;text-align:left;padding:7px 10px;border:none;border-radius:var(--r);background:none;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .1s,color .1s}
.filter-btn:hover{background:var(--surface2);color:var(--text)}
.filter-btn.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.filter-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.combo-list{display:flex;flex-direction:column;gap:10px}
.combo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.combo-card:hover{border-color:var(--border2)}
.combo-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
.combo-name{font-size:14px;font-weight:500}
.combo-cat-badge{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--surface2);color:var(--text2);white-space:nowrap}
.combo-prices{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding:0 16px 14px}
.cp{display:flex;flex-direction:column;gap:1px}
.cp-label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase}
.cp-val{font-size:15px;font-weight:500;color:var(--text)}
.cp-val.na{color:var(--text3);font-weight:400;font-style:italic}
.cp-val.hilight{color:var(--accent-text)}
.cp-val.act1{color:var(--green-text)}
.cp-val.act2{color:var(--accent2-text)}
.combo-items{padding:8px 16px 12px;border-top:1px solid var(--border);font-size:12px;color:var(--text2)}
.combo-items span{display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;background:var(--surface2);border-radius:12px}
.match-badge{font-size:11px;padding:3px 9px;border-radius:12px;margin-left:8px}
.match-full{background:#edf7f1;color:#0d4f28}
.match-partial{background:#fff8ec;color:#7a5500}
.smart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.smart-title{font-size:14px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.smart-badge{font-size:11px;padding:2px 8px;border-radius:12px;background:var(--accent-bg);color:var(--accent-text)}
.smart-empty{font-size:13px;color:var(--text3);padding:1rem 0}
.match-result{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.match-result-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2)}
.match-result-name{font-size:13px;font-weight:500}
.match-result-prices{display:flex;gap:12px;padding:10px 14px;font-size:13px;flex-wrap:wrap}
.mrp{display:flex;flex-direction:column;gap:1px}
.mrp-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.mrp-val{font-size:14px;font-weight:500;color:var(--text)}
.mrp-val.hilight{color:var(--accent-text)}
.mrp-val.act1c{color:var(--green-text)}
.mrp-val.act2c{color:var(--accent2-text)}
.mrp-val.na{color:var(--text3);font-style:italic;font-weight:400}
.empty-state{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
@media(max-width:640px){.query-layout{grid-template-columns:1fr}.filter-panel{position:static}.results{grid-template-columns:1fr 1fr}.nav-brand{display:none}}
</style>
</head>
<body>

<div id="auth-overlay">
  <h3>Modoo 價格工具</h3>
  <input type="password" id="passwordInput" placeholder="請輸入存取密碼">
  <button onclick="checkPassword()">進入工具</button>
</div>

<nav>
  <div class="nav-inner">
    <div class="nav-brand">Modoo 價格工具</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('calc')">計算機</button>
      <button class="nav-tab" onclick="showPage('query')">組合查詢</button>
    </div>
  </div>
</nav>

<div id="page-calc" class="page active">
  <div class="section-label">選擇單品</div>
  <div class="cat-tabs" id="calcCatTabs"></div>
  <div class="product-grid" id="productGrid"></div>
  <div id="calcSelectedSection" style="display:none">
    <hr>
    <div class="section-label">已選商品</div>
    <div class="selected-panel" id="selectedList"></div>
    <div class="disc-panel">
      <div class="disc-block">
        <div class="disc-section-title">組合折扣設定</div>
        <div class="disc-grid">
          <div class="disc-group"><label class="disc-label" for="saleDisc">售價折扣 (%)</label><input class="disc-input" type="number" id="saleDisc" value="90" min="1" max="100" step="0.5"></div>
          <div class="disc-group"><label class="disc-label" for="groupDisc">團購折扣 (%)</label><input class="disc-input" type="number" id="groupDisc" value="79" min="1" max="100" step="0.5"></div>
          <div class="disc-group"><label class="disc-label" for="minDisc">最低價折扣 (%)</label><input class="disc-input" type="number" id="minDisc" value="90" min="1" max="100" step="0.5"></div>
        </div>
      </div>
      <hr style="margin:1rem 0">
      <div class="disc-block">
        <div class="disc-section-title">活動價</div>
        <div class="disc-grid">
          <div class="disc-group"><label class="disc-label" for="act1Disc">一般活動價折扣 (%)</label><input class="disc-input" type="number" id="act1Disc" value="95" min="1" max="100" step="0.5"></div>
          <div class="disc-group"><label class="disc-label" for="act1Manual">或手動輸入</label><input class="disc-input" type="number" id="act1Manual" placeholder="覆蓋" min="0"></div>
          <div class="disc-sep"></div>
          <div class="disc-group"><label class="disc-label" for="act2Disc">熱銷組活動價折扣 (%)</label><input class="disc-input" type="number" id="act2Disc" value="80" min="1" max="100" step="0.5"></div>
          <div class="disc-group"><label class="disc-label" for="act2Manual">或手動輸入</label><input class="disc-input" type="number" id="act2Manual" placeholder="覆蓋" min="0"></div>
        </div>
      </div>
    </div>
    <div id="warnBox" style="display:none"></div>
    <div class="section-label">計算結果</div>
    <div class="results" id="results"></div>
  </div>
</div>

<div id="page-query" class="page">
  <div class="smart-section">
    <div class="smart-title">智慧比對 <span class="smart-badge">選好單品後自動搜尋</span></div>
    <div class="section-label" style="margin-bottom:8px">選擇要比對的單品</div>
    <div class="cat-tabs" id="queryCatTabs"></div>
    <div class="product-grid" id="queryProductGrid"></div>
    <div id="smartResults"><div class="smart-empty">選擇單品後，將顯示內容相符或高度相似的現有組合</div></div>
  </div>
  <hr>
  <div class="section-label">瀏覽所有組合</div>
  <div class="query-layout">
    <div class="filter-panel">
      <div class="filter-title">組合分類</div>
      <button class="filter-btn active" onclick="setQueryFilter('all')">全部</button>
      <button class="filter-btn" onclick="setQueryFilter('居家收納')">居家收納</button>
      <button class="filter-btn" onclick="setQueryFilter('基礎收納')">基礎收納</button>
      <button class="filter-btn" onclick="setQueryFilter('防盜機能')">防盜機能</button>
      <button class="filter-btn" onclick="setQueryFilter('輕量系列')">輕量系列</button>
      <hr class="filter-divider">
      <button class="filter-btn" onclick="setQueryFilter('momo組合')">momo 組合</button>
      <button class="filter-btn" onclick="setQueryFilter('mo+組合')">mo+ 組合</button>
      <button class="filter-btn" onclick="setQueryFilter('蝦皮組合')">蝦皮組合</button>
      <button class="filter-btn" onclick="setQueryFilter('PC組合')">PC 組合</button>
      <button class="filter-btn" onclick="setQueryFilter('官網組合')">官網組合</button>
      <button class="filter-btn" onclick="setQueryFilter('誠品組合')">誠品組合</button>
    </div>
    <div><div class="combo-list" id="comboList"></div></div>
  </div>
</div>

<script>
    function checkPassword() {
        const pwd = document.getElementById("passwordInput").value;
        if (pwd === "123456") { document.getElementById("auth-overlay").style.display = "none"; } 
        else { alert("密碼錯誤，請重新輸入"); }
    }

    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); event.currentTarget.classList.add('active'); }
    const calcCats = ["全部", ...new Set(products.map(p => p.cat))]; let calcActiveCat = "全部"; let calcSelected = {};
    function renderCalcCats() { document.getElementById("calcCatTabs").innerHTML = calcCats.map(c => `<button class="cat-tab${c===calcActiveCat?" active":""}" onclick="setCalcCat('${c}')">${c}</button>`).join(""); }
    function setCalcCat(c) { calcActiveCat = c; renderCalcCats(); renderCalcProducts(); }
    function renderCalcProducts() { const list = calcActiveCat === "全部" ? products : products.filter(p => p.cat === calcActiveCat); document.getElementById("productGrid").innerHTML = list.map(p => { const qty = calcSelected[p.name] ? calcSelected[p.name].qty : 0; return `<div class="product-card${qty>0?" selected":""}"><div class="pcat">${p.cat}</div><div class="pname">${p.name}</div><div class="pprice">原價 ${fmt(p.ori)}</div><div class="qty-row"><button class="qty-btn" onclick="calcChangeQty('${p.name}',-1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="calcChangeQty('${p.name}',1)">＋</button></div></div>`; }).join(""); }
    function calcChangeQty(name, delta) { const p = products.find(x => x.name === name); if (!p) return; if (!calcSelected[name]) calcSelected[name] = {...p, qty: 0}; calcSelected[name].qty = Math.max(0, calcSelected[name].qty + delta); if (calcSelected[name].qty === 0) delete calcSelected[name]; renderCalcProducts(); renderCalcSelected(); }
    function calcRemoveItem(name) { delete calcSelected[name]; renderCalcProducts(); renderCalcSelected(); }
    function renderCalcSelected() { const items = Object.values(calcSelected).filter(x => x.qty > 0); const sec = document.getElementById("calcSelectedSection"); sec.style.display = items.length === 0 ? "none" : "block"; if (!items.length) return; document.getElementById("selectedList").innerHTML = items.map(item => `<div class="sel-item"><div><span class="sel-name">${item.name}</span><span style="color:var(--text3);font-size:12px"> × ${item.qty}</span></div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:var(--text2)">原價 ${fmt(item.ori*item.qty)} ／ 售價 ${fmt(item.sale*item.qty)}</span><button class="remove-btn" onclick="calcRemoveItem('${item.name}')">×</button></div></div>`).join(""); calcResults(items); }
    function calcResults(items) { const saleD = parseFloat(document.getElementById("saleDisc").value)||90, groupD = parseFloat(document.getElementById("groupDisc").value)||79, minD = parseFloat(document.getElementById("minDisc").value)||90, act1D = parseFloat(document.getElementById("act1Disc").value)||95, act2D = parseFloat(document.getElementById("act2Disc").value)||80, act1M = document.getElementById("act1Manual").value, act2M = document.getElementById("act2Manual").value; const sumOri = items.reduce((s,x) => s + x.ori*x.qty, 0), sumSale = items.reduce((s,x) => s + x.sale*x.qty, 0), sumWarn = items.reduce((s,x) => s + (x.warn != null ? x.warn : Math.round(x.sale*0.75))*x.qty, 0), hasNoGroup = items.some(x => x.group == null); const oriVal = Math.round(sumOri), saleVal = Math.round(sumSale*(saleD/100)), groupVal = hasNoGroup ? null : Math.round(items.reduce((s,x) => s + x.group*x.qty, 0)*(groupD/100)), minVal = Math.round(saleVal*(minD/100)), warnVal = Math.round(sumWarn), act1Val = act1M ? parseInt(act1M) : Math.round(saleVal*(act1D/100)), act2Val = act2M ? parseInt(act2M) : Math.round(saleVal*(act2D/100)); const warnings = []; if(act1Val < warnVal) warnings.push(`一般活動價 ${fmt(act1Val)} 低於警告價 ${fmt(warnVal)}`); if(act2Val < warnVal) warnings.push(`熱銷組活動價 ${fmt(act2Val)} 低於警告價 ${fmt(warnVal)}`); if(minVal < warnVal) warnings.push(`最低價 ${fmt(minVal)} 低於警告價 ${fmt(warnVal)}`); const wb = document.getElementById("warnBox"); if(warnings.length) { wb.style.display = "flex"; wb.className = "warn-box warn"; wb.innerHTML = `<span>⚠</span><div>${warnings.join("<br>")}</div>`; } else { wb.style.display = "none"; } const act1Note = act1M ? "手動輸入" : `售價 × ${act1D}%`, act2Note = act2M ? "手動輸入" : `售價 × ${act2D}%`; document.getElementById("results").innerHTML = `<div class="result-card"><div class="rl">原價</div><div class="rv">${fmt(oriVal)}</div><div class="rs">單品原價加總</div></div><div class="result-card r-sale"><div class="rl">售價</div><div class="rv">${fmt(saleVal)}</div><div class="rs">單品售價加總 × ${saleD}%</div></div><div class="result-card"><div class="rl">團購價</div><div class="rv">${hasNoGroup ? "不適用" : fmt(groupVal)}</div><div class="rs">${hasNoGroup ? "含不支援團購商品" : "單品團購加總 × "+groupD+"%"}</div></div><div class="result-card"><div class="rl">最低價</div><div class="rv">${fmt(minVal)}</div><div class="rs">售價 × ${minD}%</div></div><div class="result-card r-act1"><div class="rl">一般活動價</div><div class="rv">${fmt(act1Val)}</div><div class="rs">${act1Note}</div></div><div class="result-card r-act2"><div class="rl">熱銷組活動價</div><div class="rv">${fmt(act2Val)}</div><div class="rs">${act2Note}</div></div><div class="result-card${warnVal > minVal ? " r-warn-alert" : ""}"><div class="rl">警告價</div><div class="rv">${fmt(warnVal)}</div><div class="rs">單品警告價加總</div></div>`; }
    ["saleDisc","groupDisc","minDisc","act1Disc","act1Manual","act2Disc","act2Manual"].forEach(id => { document.getElementById(id).addEventListener("input", renderCalcSelected); });
    const queryCats = ["全部", ...new Set(products.map(p => p.cat))]; let queryActiveCat = "全部"; let querySelected = {}; let queryFilter = "all";
    function renderQueryCats() { document.getElementById("queryCatTabs").innerHTML = queryCats.map(c => `<button class="cat-tab${c===queryActiveCat?" active":""}" onclick="setQueryCat('${c}')">${c}</button>`).join(""); }
    function setQueryCat(c) { queryActiveCat = c; renderQueryCats(); renderQueryProducts(); }
    function renderQueryProducts() { const list = queryActiveCat === "全部" ? products : products.filter(p => p.cat === queryActiveCat); document.getElementById("queryProductGrid").innerHTML = list.map(p => { const qty = querySelected[p.name] ? querySelected[p.name].qty : 0; return `<div class="product-card${qty>0?" selected":""}"><div class="pcat">${p.cat}</div><div class="pname">${p.name}</div><div class="pprice">售價 ${fmt(p.sale)}</div><div class="qty-row"><button class="qty-btn" onclick="queryChangeQty('${p.name}',-1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="queryChangeQty('${p.name}',1)">＋</button></div></div>`; }).join(""); }
    function queryChangeQty(name, delta) { const p = products.find(x => x.name === name); if (!p) return; if (!querySelected[name]) querySelected[name] = {...p, qty: 0}; querySelected[name].qty = Math.max(0, querySelected[name].qty + delta); if (querySelected[name].qty === 0) delete querySelected[name]; renderQueryProducts(); runSmartMatch(); }
    function runSmartMatch() { const sel = Object.fromEntries(Object.entries(querySelected).filter(([,v]) => v.qty > 0).map(([k,v]) => [k, v.qty])); const selKeys = Object.keys(sel); if (selKeys.length === 0) { document.getElementById("smartResults").innerHTML = '<div class="smart-empty">選擇單品後，將顯示內容相符或高度相似的現有組合</div>'; return; } const results = combos.map(combo => { const ci = combo.items, ciKeys = Object.keys(ci), isFullMatch = JSON.stringify(Object.fromEntries(Object.entries(ci).sort())) === JSON.stringify(Object.fromEntries(Object.entries(sel).sort())), overlapItems = selKeys.filter(k => ci[k]), overlapQty = overlapItems.reduce((s,k) => s + Math.min(sel[k], ci[k]), 0), totalSel = Object.values(sel).reduce((a,b)=>a+b,0), totalCombo = Object.values(ci).reduce((a,b)=>a+b,0), score = overlapQty / Math.max(totalSel, totalCombo); return { combo, isFullMatch, score }; }).filter(r => r.isFullMatch || r.score >= 0.5).sort((a,b) => { if (a.isFullMatch !== b.isFullMatch) return a.isFullMatch ? -1 : 1; return b.score - a.score; }).slice(0, 8); if (results.length === 0) { document.getElementById("smartResults").innerHTML = '<div class="smart-empty">找不到相似的現有組合</div>'; return; } document.getElementById("smartResults").innerHTML = results.map(({combo, isFullMatch, score}) => { const pct = Math.round(score * 100), badge = isFullMatch ? `<span class="match-badge match-full">完全相符</span>` : `<span class="match-badge match-partial">相似度 ${pct}%</span>`, itemSpans = Object.entries(combo.items).map(([k,v]) => `<span>${k}${v>1?" ×"+v:""}</span>`).join(""); return `<div class="match-result"><div class="match-result-header"><span class="match-result-name">${combo.name}</span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--text3)">${combo.cat}</span>${badge}</div></div><div class="match-result-prices"><div class="mrp"><div class="mrp-label">原價</div><div class="mrp-val">${fmt(combo.ori)}</div></div><div class="mrp"><div class="mrp-label">售價</div><div class="mrp-val hilight">${fmt(combo.sale)}</div></div><div class="mrp"><div class="mrp-label">團購價</div><div class="mrp-val${combo.group===null?" na":""}">${combo.group===null?"不適用":fmt(combo.group)}</div></div><div class="mrp"><div class="mrp-label">最低價</div><div class="mrp-val">${fmt(combo.low)}</div></div><div class="mrp"><div class="mrp-label">活動價</div><div class="mrp-val act1c">${fmt(combo.act)}</div></div><div class="mrp"><div class="mrp-label">警告價</div><div class="mrp-val${combo.warn && combo.low && combo.low < combo.warn ? " na":""}">${fmt(combo.warn)}</div></div></div><div class="combo-items">${itemSpans}</div></div>`; }).join(""); }
    function setQueryFilter(cat) { queryFilter = cat; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); renderComboList(); }
    function renderComboList() { const list = queryFilter === "all" ? combos : combos.filter(c => c.cat === queryFilter); if (list.length === 0) { document.getElementById("comboList").innerHTML = '<div class="empty-state">此分類暫無組合</div>'; return; } document.getElementById("comboList").innerHTML = list.map(combo => { const itemSpans = Object.entries(combo.items).map(([k,v]) => `<span>${k}${v>1?" ×"+v:""}</span>`).join(""); return `<div class="combo-card"><div class="combo-header"><span class="combo-name">${combo.name}</span><span class="combo-cat-badge">${combo.cat}</span></div><div class="combo-prices"><div class="cp"><div class="cp-label">原價</div><div class="cp-val">${fmt(combo.ori)}</div></div><div class="cp"><div class="cp-label">售價</div><div class="cp-val hilight">${fmt(combo.sale)}</div></div><div class="cp"><div class="cp-label">團購價</div><div class="cp-val${combo.group===null?" na":""}">${combo.group===null?"不適用":fmt(combo.group)}</div></div><div class="cp"><div class="cp-label">最低價</div><div class="cp-val">${fmt(combo.low)}</div></div><div class="cp"><div class="cp-label">活動價</div><div class="cp-val act1">${fmt(combo.act)}</div></div><div class="cp"><div class="cp-label">警告價</div><div class="cp-val">${fmt(combo.warn)}</div></div></div><div class="combo-items">${itemSpans}</div></div>`; }).join(""); }
    renderCalcCats(); renderCalcProducts(); renderQueryCats(); renderQueryProducts(); renderComboList();
</script>
